name: Deploy Smart Farm Dashboard to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3

      - name: Deploy to gh-pages
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # Get the dashboard files
          TEMP_DIR=$(mktemp -d)
          cp -r Projects/Smart_Farm/custom_subscriber/* "$TEMP_DIR/"
          
          # Switch to gh-pages branch (create if doesn't exist)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          
          # Clear everything except .git
          find . -not -path './.git*' -not -name '.git*' -type f -delete
          find . -not -path './.git*' -not -name '.git*' -type d -delete
          
          # Copy new files
          cp -r "$TEMP_DIR"/* .
          
          # Commit and push
          git add .
          git commit -m "Deploy from main (${{ github.sha }})" || exit 0
          git push origin gh-pages
